<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HK Global Blog - Secure Admin</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        body { font-family: sans-serif; background: #eef2f7; padding: 20px; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .admin-container { background: white; padding: 40px; border-radius: 20px; box-shadow: 0 15px 35px rgba(0,0,0,0.1); width: 100%; max-width: 600px; }
        h2 { color: #1a73e8; text-align: center; }
        input, textarea, select { width: 100%; padding: 12px; margin-top: 10px; border: 1px solid #ddd; border-radius: 10px; box-sizing: border-box; }
        button { background: #1a73e8; color: white; border: none; padding: 15px; width: 100%; margin-top: 25px; cursor: pointer; border-radius: 10px; font-weight: bold; }
        #adminPassword { border: 2px solid #1a73e8; }
    </style>
</head>
<body>
<div class="admin-container">
    <h2>🚀 HK Editor Hub (Blog)</h2>
    <input type="password" id="adminPassword" placeholder="Security Access Code">
    <input type="text" id="title" placeholder="Article Title">
    <select id="lang">
        <option value="en">English</option>
        <option value="sv">Svenska</button>
        <option value="ar">العربية</option>
    </select>
    <select id="category">
        <option value="Politics">Politics</option>
        <option value="Economy">Economy</option>
    </select>
    <input type="text" id="imageUrl" placeholder="Image Link">
    <textarea id="content" rows="10" placeholder="Content..."></textarea>
    <button onclick="publishArticle()">PUBLISH TO BLOG</button>
    <div id="status" style="text-align:center; margin-top:15px; font-weight:bold;"></div>
</div>
<script>
    const firebaseConfig = {
        apiKey: "AIzaSyAJDyKosoysPzOjl-9DqaZIDEg8GRPfXzQ",
        authDomain: "hk-blog-3ed96.firebaseapp.com",
        projectId: "hk-blog-3ed96",
        storageBucket: "hk-blog-3ed96.firebasestorage.app",
        messagingSenderId: "339658398793",
        appId: "1:339658398793:web:e38a09f83fd01c2e773398",
        measurementId: "G-FSB1QBLZM7",
        databaseURL: "https://hk-blog-3ed96-default-rtdb.firebaseio.com"
    };
    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();
    function publishArticle() {
        const pass = document.getElementById('adminPassword').value;
        const status = document.getElementById('status');
        if (pass !== "Sabah19920701") { alert("❌ Wrong Access Code!"); return; }
        
        const title = document.getElementById('title').value;
        const content = document.getElementById('content').value;
        if(title && content) {
            status.innerHTML = "Publishing...";
            database.ref('posts').push({
                title: title,
                lang: document.getElementById('lang').value,
                category: document.getElementById('category').value,
                imageUrl: document.getElementById('imageUrl').value,
                content: content,
                date: new Date().toLocaleDateString('en-GB')
            }).then(() => {
                status.innerHTML = "🎉 Done!";
                status.style.color = "#27ae60";
            });
        }
    }
</script>
</body>
</html>
